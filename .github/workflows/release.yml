name: Build and Release Tauri App

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Add macOS universal targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2

      - run: npm install

      - run: npm run tauri build -- ${{ matrix.args }}

      - name: Rename artifacts
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" == "macos-latest" ]; then
            cd src-tauri/target/universal-apple-darwin/release/bundle/dmg
            mv *.dmg mtool_${{ github.ref_name }}.dmg
          else
            cd src-tauri/target/release/bundle/nsis
            mv *-setup.exe mtool_${{ github.ref_name }}.exe
            cd ../msi
            mv *.msi mtool_${{ github.ref_name }}.msi
          fi

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/**/bundle/**/*.dmg
            src-tauri/target/**/bundle/**/*.msi
            src-tauri/target/**/bundle/**/*.exe
