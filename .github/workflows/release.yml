name: Build and Release Tauri App

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Add macOS universal targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2

      - run: npm install

      - name: Build Tauri app
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.MTOOL_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is EMPTY!"
            exit 1
          fi
          echo "TAURI_SIGNING_PRIVATE_KEY is set (length: ${#TAURI_SIGNING_PRIVATE_KEY})"
          npm run tauri build -- ${{ matrix.args }}

      - name: List bundle output (debug)
        shell: bash
        run: |
          echo "=== Files in bundle ==="
          find src-tauri/target -path "*/bundle/*" -type f | sort
          echo "=== Directories in bundle ==="
          find src-tauri/target -path "*/bundle/*" -type d | sort

      # macOS: manually create and sign the updater archive
      # createUpdaterArtifacts does not generate .app.tar.gz for universal builds
      - name: Create and sign macOS updater archive
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.MTOOL_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          TAG="${{ github.ref_name }}"
          KNOWN_DIR="src-tauri/target/universal-apple-darwin/release/bundle/macos"

          # Search entire target tree for .app (handles any Tauri output path variation)
          APP=$(find src-tauri/target -name "*.app" -type d | grep -v "\.dSYM" | head -1)
          if [ -z "$APP" ]; then
            echo "::error::No .app bundle found anywhere in src-tauri/target"
            echo "All bundle dirs:"
            find src-tauri/target -path "*/bundle/*" -type d | sort || true
            exit 1
          fi
          APP_NAME=$(basename "$APP")
          ACTUAL_BUNDLE_DIR=$(dirname "$APP")
          echo "Found: $APP at $ACTUAL_BUNDLE_DIR"

          # Create .app.tar.gz next to the .app
          (cd "$ACTUAL_BUNDLE_DIR" && tar czf "mtool_${TAG}.app.tar.gz" "$APP_NAME")
          TAR_PATH="$ACTUAL_BUNDLE_DIR/mtool_${TAG}.app.tar.gz"
          echo "Created: $TAR_PATH"

          # Write key to temp file and sign
          echo "$TAURI_SIGNING_PRIVATE_KEY" > /tmp/signer.key
          npm run tauri -- signer sign -f /tmp/signer.key -p "" "$TAR_PATH"
          rm -f /tmp/signer.key
          echo "Signed: ${TAR_PATH}.sig"

          # Ensure artifacts are at the expected path for subsequent upload steps
          if [ "$ACTUAL_BUNDLE_DIR" != "$KNOWN_DIR" ]; then
            mkdir -p "$KNOWN_DIR"
            cp "$TAR_PATH" "$KNOWN_DIR/"
            cp "${TAR_PATH}.sig" "$KNOWN_DIR/"
            echo "Copied artifacts to $KNOWN_DIR"
          fi
          ls -la "$KNOWN_DIR/mtool_${TAG}.app.tar.gz"*

      # Windows: rename the NSIS artifacts
      - name: Rename artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          NSIS_DIR="src-tauri/target/release/bundle/nsis"

          EXE=$(find "$NSIS_DIR" -name "*-setup.exe" | head -1)
          SIG=$(find "$NSIS_DIR" -name "*-setup.exe.sig" | head -1)

          echo "EXE: $EXE"
          echo "SIG: $SIG"

          if [ -z "$EXE" ]; then
            echo "::error::No -setup.exe found"
            exit 1
          fi
          mv "$EXE" "${NSIS_DIR}/mtool_${TAG}.exe"

          if [ -z "$SIG" ]; then
            echo "::error::No -setup.exe.sig found — signing failed"
            exit 1
          fi
          mv "$SIG" "${NSIS_DIR}/mtool_${TAG}.exe.sig"

      - name: Upload macOS updater signature
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-sig
          path: src-tauri/target/universal-apple-darwin/release/bundle/macos/mtool_${{ github.ref_name }}.app.tar.gz.sig
          if-no-files-found: error

      - name: Upload Windows updater signature
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-sig
          path: src-tauri/target/release/bundle/nsis/mtool_${{ github.ref_name }}.exe.sig
          if-no-files-found: error

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/**/bundle/**/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/mtool_${{ github.ref_name }}.app.tar.gz
            src-tauri/target/**/bundle/**/*.exe

  generate-update-json:
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download macOS signature
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: macos-sig
          path: sigs/macos

      - name: Download Windows signature
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: windows-sig
          path: sigs/windows

      - name: Check if any signatures were downloaded
        id: check-sigs
        run: |
          if [ -z "$(ls sigs/macos 2>/dev/null)" ] && [ -z "$(ls sigs/windows 2>/dev/null)" ]; then
            echo "has_sigs=false" >> $GITHUB_OUTPUT
            echo "::warning::No signature files found. Skipping latest.json generation."
          else
            echo "has_sigs=true" >> $GITHUB_OUTPUT
          fi

      - name: Generate latest.json
        if: steps.check-sigs.outputs.has_sigs == 'true'
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: node .github/scripts/gen-latest-json.js

      - name: Upload latest.json to release
        if: steps.check-sigs.outputs.has_sigs == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: latest.json
