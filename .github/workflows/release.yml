name: Build and Release Tauri App

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Add macOS universal targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2

      - run: npm install

      - name: Build Tauri app
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.MTOOL_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is EMPTY! Please check your GitHub Secrets."
          else
            echo "TAURI_SIGNING_PRIVATE_KEY is set (length: ${#TAURI_SIGNING_PRIVATE_KEY})"
          fi
          npm run tauri build -- ${{ matrix.args }}

      - name: List bundle output (debug)
        shell: bash
        run: find src-tauri/target -path "*/bundle/*" -type f | sort

      - name: Rename artifacts (macOS)
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"

          # 用 find 定位文件，不依赖硬编码路径
          DMG=$(find src-tauri/target -path "*/bundle/dmg/*.dmg" | head -1)
          TAR=$(find src-tauri/target -path "*/bundle/macos/*.app.tar.gz" ! -name "*.sig" | head -1)
          SIG=$(find src-tauri/target -path "*/bundle/macos/*.app.tar.gz.sig" | head -1)

          echo "DMG: $DMG"
          echo "TAR: $TAR"
          echo "SIG: $SIG"

          if [ -n "$DMG" ]; then
            mv "$DMG" "$(dirname "$DMG")/mtool_${TAG}.dmg"
          fi

          if [ -n "$TAR" ]; then
            TAR_DIR=$(dirname "$TAR")
            mv "$TAR" "${TAR_DIR}/mtool_${TAG}.app.tar.gz"
          fi

          if [ -n "$SIG" ]; then
            SIG_DIR=$(dirname "$SIG")
            mv "$SIG" "${SIG_DIR}/mtool_${TAG}.app.tar.gz.sig"
          else
            echo "::error::No .app.tar.gz.sig found! Signing failed."
            exit 1
          fi

      - name: Rename artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          NSIS_DIR="src-tauri/target/release/bundle/nsis"

          EXE=$(find "$NSIS_DIR" -name "*-setup.exe" | head -1)
          SIG=$(find "$NSIS_DIR" -name "*-setup.exe.sig" | head -1)

          echo "EXE: $EXE"
          echo "SIG: $SIG"

          if [ -n "$EXE" ]; then
            mv "$EXE" "${NSIS_DIR}/mtool_${TAG}.exe"
          fi

          if [ -n "$SIG" ]; then
            mv "$SIG" "${NSIS_DIR}/mtool_${TAG}.exe.sig"
          else
            echo "::error::No .exe.sig found! Signing failed."
            exit 1
          fi

      - name: Upload macOS updater signature
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-sig
          path: src-tauri/target/**/bundle/macos/mtool_${{ github.ref_name }}.app.tar.gz.sig
          if-no-files-found: error

      - name: Upload Windows updater signature
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-sig
          path: src-tauri/target/release/bundle/nsis/mtool_${{ github.ref_name }}.exe.sig
          if-no-files-found: error

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/**/bundle/**/*.dmg
            src-tauri/target/**/bundle/**/*.app.tar.gz
            src-tauri/target/**/bundle/**/*.exe

  generate-update-json:
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download macOS signature
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: macos-sig
          path: sigs/macos

      - name: Download Windows signature
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: windows-sig
          path: sigs/windows

      - name: Check if any signatures were downloaded
        id: check-sigs
        run: |
          if [ -z "$(ls sigs/macos 2>/dev/null)" ] && [ -z "$(ls sigs/windows 2>/dev/null)" ]; then
            echo "has_sigs=false" >> $GITHUB_OUTPUT
            echo "::warning::No signature files found. Skipping latest.json generation."
          else
            echo "has_sigs=true" >> $GITHUB_OUTPUT
          fi

      - name: Generate latest.json
        if: steps.check-sigs.outputs.has_sigs == 'true'
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: node .github/scripts/gen-latest-json.js

      - name: Upload latest.json to release
        if: steps.check-sigs.outputs.has_sigs == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: latest.json
