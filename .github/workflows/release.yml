name: Build and Release Tauri App

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Add macOS universal targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2

      - run: npm install

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.MTOOL_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is EMPTY! Please check your GitHub Secrets."
          else
            echo "TAURI_SIGNING_PRIVATE_KEY is set (length: ${#TAURI_SIGNING_PRIVATE_KEY})"
          fi
          npm run tauri build -- ${{ matrix.args }}

      - name: List bundle output (debug)
        shell: bash
        run: find src-tauri/target -path "*/bundle/*" -type f | sort

      - name: Rename artifacts (macOS)
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          # 检查并重命名 DMG
          cd src-tauri/target/universal-apple-darwin/release/bundle/dmg
          if ls *.dmg 1> /dev/null 2>&1; then
            mv *.dmg mtool_${{ github.ref_name }}.dmg
          fi
          
          # 检查并重命名 Updater 资源
          cd ../macos
          if ls *.app.tar.gz 1> /dev/null 2>&1; then
            mv *.app.tar.gz mtool_${{ github.ref_name }}.app.tar.gz
          fi
          if ls *.app.tar.gz.sig 1> /dev/null 2>&1; then
            mv *.app.tar.gz.sig mtool_${{ github.ref_name }}.app.tar.gz.sig
          else
            echo "::warning::No .sig file found! Signing may have failed."
          fi

      - name: Rename artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          cd src-tauri/target/release/bundle/nsis
          mv *-setup.exe mtool_${{ github.ref_name }}.exe
          if ls *-setup.exe.sig 2>/dev/null; then
            mv *-setup.exe.sig mtool_${{ github.ref_name }}.exe.sig
          else
            echo "WARNING: No .exe.sig found — signing key may not be working"
          fi

      - name: Upload macOS updater signature
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-sig
          path: src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: warn

      - name: Upload Windows updater signature
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-sig
          path: src-tauri/target/release/bundle/nsis/*.exe.sig
          if-no-files-found: warn

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/**/bundle/**/*.dmg
            src-tauri/target/**/bundle/**/*.app.tar.gz
            src-tauri/target/**/bundle/**/*.exe

  generate-update-json:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download macOS signature
        uses: actions/download-artifact@v4
        with:
          name: macos-sig
          path: sigs/macos

      - name: Download Windows signature
        uses: actions/download-artifact@v4
        with:
          name: windows-sig
          path: sigs/windows

      - name: Generate latest.json
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: node .github/scripts/gen-latest-json.js

      - uses: softprops/action-gh-release@v2
        with:
          files: latest.json
